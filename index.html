<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CrossPop Crossword</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Mini crossword</p>
        <h1>CrossPop</h1>
        <p class="subtitle">Movies, music, geography and mixed mini puzzles.</p>
      </div>
    </section>

    <section class="panel home-panel" id="homePanel">
      <h2>Choose a puzzle</h2>
      <p class="small">7x7 intersecting crossword grids. Best times are saved on this device.</p>
      <div class="theme-grid">
        <button class="theme-card" data-puzzle="mixed-001.json">
          <strong>Mixed</strong><span>Pop & Places Mini</span>
        </button>
        <button class="theme-card" data-puzzle="movies-001.json">
          <strong>Movies</strong><span>Hollywood Mini</span>
        </button>
        <button class="theme-card" data-puzzle="music-001.json">
          <strong>Music</strong><span>Chart Hits Mini</span>
        </button>
        <button class="theme-card" data-puzzle="geography-001.json">
          <strong>Geography</strong><span>World Places Mini</span>
        </button>
      </div>
    </section>

    <section class="panel puzzle-panel hidden" id="puzzlePanel">
      <div class="puzzle-topbar">
        <button id="backBtn" class="ghost-btn">← Puzzles</button>
        <div class="timer-box">
          <span id="timer">00:00</span>
          <span id="bestTime">Best: --</span>
        </div>
      </div>

      <div class="puzzle-title-row">
        <div>
          <h2 id="puzzleTitle">Puzzle</h2>
          <p id="puzzleMeta" class="small"></p>
        </div>
        <button id="changeDirectionBtn" class="ghost-btn">Direction: Across</button>
      </div>

      <div class="game-layout">
        <section>
          <div id="grid" class="crossword-grid" aria-label="Crossword grid"></div>
          <input id="mobileInput" autocomplete="off" autocapitalize="characters" inputmode="text" maxlength="1" aria-label="Mobile crossword input" />
          <p id="activeClue" class="active-clue">Tap a square, then type.</p>

          <div class="controls">
            <button id="checkBtn">Check</button>
            <button id="revealLetterBtn">Reveal Letter</button>
            <button id="revealWordBtn">Reveal Word</button>
            <button id="resetBtn">Reset</button>
          </div>
        </section>

        <aside class="clues">
          <div>
            <h3>Across</h3>
            <ol id="acrossClues"></ol>
          </div>
          <div>
            <h3>Down</h3>
            <ol id="downClues"></ol>
          </div>
        </aside>
      </div>
    </section>

    <section class="modal hidden" id="completeModal">
      <div class="modal-card">
        <h2>Puzzle complete</h2>
        <p id="completeText"></p>
        <button id="closeModalBtn">Continue</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
