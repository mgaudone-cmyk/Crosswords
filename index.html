<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CrossPop Crossword</title>
  <link rel="stylesheet" href="./styles.css?v=2.1" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <button id="backBtn" class="plain-btn hidden">‹ Puzzles</button>
      <div class="brand">CrossPop</div>
      <div class="clock">
        <strong id="timer">00:00</strong>
        <span id="bestTime">Best --</span>
      </div>
    </header>

    <section id="homePanel" class="home">
      <div class="home-card">
        <p class="label">Crossword testing app</p>
        <h1>Choose a puzzle</h1>
        <p>Book-style crossword grid, cleaner clues, no custom keyboard, and fixed typing behavior.</p>

        <div class="puzzle-list">
          <button data-puzzle="mixed-001.json"><span><b>Pop & Places</b><small>Mixed • 15x15</small></span><i>Start</i></button>
          <button data-puzzle="movies-001.json"><span><b>Movie Night</b><small>Movies • 15x15</small></span><i>Start</i></button>
          <button data-puzzle="music-001.json"><span><b>Chart Hits</b><small>Music • 15x15</small></span><i>Start</i></button>
          <button data-puzzle="geography-001.json"><span><b>World Places</b><small>Geography • 15x15</small></span><i>Start</i></button>
        </div>
      </div>
    </section>

    <section id="puzzlePanel" class="puzzle hidden">
      <div class="title-row">
        <div>
          <p id="puzzleMeta" class="label"></p>
          <h1 id="puzzleTitle"></h1>
        </div>
      </div>

      <div class="clue-strip">
        <button id="prevClueBtn" class="clue-nav" type="button">‹</button>
        <div id="activeClue" class="active-clue">Tap a square to begin.</div>
        <button id="nextClueBtn" class="clue-nav" type="button">›</button>
      </div>

      <div class="workspace">
        <section class="board-zone">
          <div id="grid" class="crossword-grid" aria-label="Crossword grid"></div>

          <input
            id="mobileInput"
            class="hidden-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="characters"
            spellcheck="false"
            inputmode="text"
            aria-label="Type crossword letters"
          />

          <div class="action-bar">
            <button id="checkBtn" type="button">Check</button>
            <button id="revealLetterBtn" type="button">Reveal letter</button>
            <button id="revealWordBtn" type="button">Reveal word</button>
            <button id="resetBtn" class="light" type="button">Reset</button>
          </div>
        </section>

        <aside class="clues-panel">
          <section>
            <h2>Across</h2>
            <ol id="acrossClues"></ol>
          </section>
          <section>
            <h2>Down</h2>
            <ol id="downClues"></ol>
          </section>
        </aside>
      </div>
    </section>

    <section id="completeModal" class="modal hidden">
      <div class="modal-card">
        <h2>Completed</h2>
        <p id="completeText"></p>
        <button id="closeModalBtn" type="button">Close</button>
      </div>
    </section>
  </main>

  <script src="./app.js?v=2.1"></script>
</body>
</html>
