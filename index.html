<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CrossPop Crossword</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="backBtn" class="top-btn hidden">‹ Puzzles</button>
      <div class="brand">CrossPop</div>
      <div class="timer-area">
        <span id="timer">00:00</span>
        <span id="bestTime">Best --</span>
      </div>
    </header>

    <section id="homePanel" class="home">
      <div class="home-card">
        <p class="kicker">Mini crossword</p>
        <h1>Choose a puzzle</h1>
        <p class="home-copy">A cleaner New York Times-style mini crossword layout for iPhone testing.</p>

        <div class="puzzle-list">
          <button class="puzzle-choice" data-puzzle="mixed-001.json"><span><strong>Pop & Places Mini</strong><small>Mixed • Easy-Medium</small></span><em>Play</em></button>
          <button class="puzzle-choice" data-puzzle="movies-001.json"><span><strong>Movie Night Mini</strong><small>Movies • Easy-Medium</small></span><em>Play</em></button>
          <button class="puzzle-choice" data-puzzle="music-001.json"><span><strong>Chart Hits Mini</strong><small>Music • Easy-Medium</small></span><em>Play</em></button>
          <button class="puzzle-choice" data-puzzle="geography-001.json"><span><strong>World Places Mini</strong><small>Geography • Easy-Medium</small></span><em>Play</em></button>
        </div>
      </div>
    </section>

    <section id="puzzlePanel" class="puzzle hidden">
      <div class="puzzle-heading">
        <p id="puzzleMeta" class="meta"></p>
        <h1 id="puzzleTitle">Puzzle</h1>
      </div>

      <div class="active-clue-bar">
        <button id="prevClueBtn" class="nav-clue">‹</button>
        <div id="activeClue" class="active-clue">Tap a square to start.</div>
        <button id="nextClueBtn" class="nav-clue">›</button>
      </div>

      <div class="desktop-layout">
        <section class="board-column">
          <div id="grid" class="crossword-grid" aria-label="Crossword grid"></div>

          <div class="typed-panel">
            <span>Active square</span>
            <strong id="typedPreview">—</strong>
          </div>

          <input id="mobileInput" autocomplete="off" autocapitalize="characters" inputmode="text" maxlength="1" aria-label="Mobile crossword input" />

          <div class="actions">
            <button id="checkBtn">Check</button>
            <button id="revealLetterBtn">Reveal Letter</button>
            <button id="revealWordBtn">Reveal Word</button>
            <button id="resetBtn" class="secondary">Reset</button>
          </div>

          <div class="keyboard" id="keyboard"></div>
        </section>

        <aside class="clue-panel">
          <div class="clue-columns">
            <section>
              <h2>Across</h2>
              <ol id="acrossClues"></ol>
            </section>
            <section>
              <h2>Down</h2>
              <ol id="downClues"></ol>
            </section>
          </div>
        </aside>
      </div>

      <div class="mobile-clue-drawer">
        <div class="drawer-tabs">
          <button id="mobileAcrossTab" class="tab active" data-tab="across">Across</button>
          <button id="mobileDownTab" class="tab" data-tab="down">Down</button>
        </div>
        <ol id="mobileClues"></ol>
      </div>
    </section>

    <section class="modal hidden" id="completeModal">
      <div class="modal-card">
        <h2>Nice work</h2>
        <p id="completeText"></p>
        <button id="closeModalBtn">Continue</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
